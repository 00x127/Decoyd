name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win

          - os: ubuntu-latest
            platform: linux

          - os: macos-latest
            platform: mac

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y fakeroot dpkg-dev libarchive-tools

      - name: Build
        run: npm run build:${{ matrix.platform }} -- --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: decoyd-${{ matrix.platform }}
          path: |
            dist/Decoyd.exe
            dist/Decoyd.AppImage
            dist/Decoyd.deb
            dist/Decoyd-x64.dmg
            dist/Decoyd-arm64.dmg
          if-no-files-found: ignore

  release:
    needs: build
    if: always() && github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: Decoyd ${{ github.ref_name }}
          body: |
            ## Download

            | Platform | File | Notes |
            |----------|------|-------|
            | Windows | `Decoyd.exe` | Run directly |
            | Linux | `Decoyd.AppImage` | See below |
            | Linux | `Decoyd.deb` | `sudo dpkg -i Decoyd.deb` |
            | macOS (Apple Silicon) | `Decoyd-arm64.dmg` | |
            | macOS (Intel) | `Decoyd-x64.dmg` | |

            ## Linux quick start
            ```bash
            chmod +x Decoyd.AppImage

            # Ubuntu 22.04+
            sudo apt install libfuse2t64

            # Ubuntu 20.04 / older Debian
            sudo apt install libfuse2

            ./Decoyd.AppImage
            ```

            > **No FUSE?** `./Decoyd.AppImage --appimage-extract && cd squashfs-root && ./AppRun`
          files: artifacts/**/*
          draft: false
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
